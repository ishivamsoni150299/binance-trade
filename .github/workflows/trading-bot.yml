name: Trading Bot (Always-On)

on:
  schedule:
    # Every 5 minutes — free on GitHub Actions
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      pair:
        description: 'Trading pair'
        required: false
        default: 'BTCUSDT'
      timeframe:
        description: 'Timeframe (1m 5m 15m 1h 4h 1d)'
        required: false
        default: '1h'
      paper_trading:
        description: 'Paper trading? (true/false)'
        required: false
        default: 'true'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    # Required to commit trades.json back to repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run bot
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          BINANCE_TESTNET: ${{ vars.BINANCE_TESTNET || 'true' }}
          BOT_PAIR: ${{ github.event.inputs.pair || vars.BOT_PAIR || 'BTCUSDT' }}
          BOT_TIMEFRAME: ${{ github.event.inputs.timeframe || vars.BOT_TIMEFRAME || '1h' }}
          BOT_PAPER_TRADING: ${{ github.event.inputs.paper_trading || vars.BOT_PAPER_TRADING || 'true' }}
          BOT_POSITION_SIZE_PCT: ${{ vars.BOT_POSITION_SIZE_PCT || '5' }}
          BOT_STOP_LOSS_PCT: ${{ vars.BOT_STOP_LOSS_PCT || '2' }}
          BOT_TAKE_PROFIT_PCT: ${{ vars.BOT_TAKE_PROFIT_PCT || '4' }}
        run: |
          echo "=== Bot Configuration ==="
          echo "Pair: $BOT_PAIR | Timeframe: $BOT_TIMEFRAME | Paper: $BOT_PAPER_TRADING | Testnet: $BINANCE_TESTNET"
          npx --yes tsx scripts/bot-runner.ts

      - name: Commit trades log
        run: |
          git config user.name "BTrader Bot"
          git config user.email "bot@btrade.local"
          git add trades.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: update trades.json [skip ci]"
          git push 2>/dev/null || true
